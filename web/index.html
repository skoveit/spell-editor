<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>writeright</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="workspace">

        <!-- Editor -->
        <div class="editor-column">
            <div class="editor-meta">
                <span class="editor-label">document</span>
                <span class="error-count" id="error-count"></span>
            </div>
            <div class="editor-wrapper">
                <div class="highlights" id="highlights"></div>
                <textarea id="editor" placeholder="Start writing. Misspelled words will appear underlined..."
                    spellcheck="false"></textarea>
            </div>
        </div>


    </div>

    <div class="mode-toast" id="mode-toast"></div>

    <script src="app.js"></script>
</body>

</html>
